aid: ezrentout
url: https://raw.githubusercontent.com/api-evangelist/ezrentout/refs/heads/main/apis.yml
name: EZRentOut
kind: company
description: EZRentOut is cloud-based equipment rental management software from EZO
  (the company behind EZOfficeInventory) for rental businesses to manage orders,
  fixed and inventory assets, bundles, customers, members, locations, purchase
  orders, and maintenance. Its REST API is made available to paying customers for
  custom integrations - each request is authenticated with a per-company access
  token sent in a token header over HTTPS, endpoints are namespaced with a .api
  suffix, and calls are scoped to the customer's own {subdomain}.ezrentout.com
  tenant. The API covers orders (baskets), assets, inventory and stock assets,
  bundles, customers and businesses, members, locations, availability, payments and
  invoicing, purchase orders, and service/work-order maintenance.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Equipment Rental
- Rental Management
- Asset Tracking
- Inventory
- Order Management
- EZO
