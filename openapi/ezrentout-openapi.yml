components:
  securitySchemes:
    tokenAuth:
      type: apiKey
      in: header
      name: token
      description: >-
        Per-company access token generated in Settings (API must be enabled by
        the account owner). Sent in the `token` HTTP header on every request
        over HTTPS.
  parameters:
    Page:
      name: page
      in: query
      description: Page number for paginated list results (default 1).
      schema:
        type: integer
        default: 1
    OrderNum:
      name: orderNum
      in: path
      required: true
      description: The order (basket) number.
      schema:
        type: integer
    AssetNum:
      name: assetNum
      in: path
      required: true
      description: The asset / inventory item number.
      schema:
        type: integer
    CustomerId:
      name: customerId
      in: path
      required: true
      description: The customer ID.
      schema:
        type: integer
    UserId:
      name: userId
      in: path
      required: true
      description: The member (user) ID.
      schema:
        type: integer
    LocationId:
      name: locationId
      in: path
      required: true
      description: The location ID.
      schema:
        type: integer
    PoId:
      name: poId
      in: path
      required: true
      description: The purchase order ID.
      schema:
        type: integer
  responses:
    Unauthorized:
      description: Missing or invalid access token.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: The requested resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    RateLimited:
      description: Too many requests. Honor the Retry-After header before retrying.
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds to wait before retrying.
        X-Rate-Limit:
          schema:
            type: integer
          description: The account request quota for the window.
        X-Rate-Limit-Remaining:
          schema:
            type: integer
          description: Requests remaining in the current window.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    Order:
      type: object
      description: A rental order (basket).
      properties:
        id:
          type: integer
        number:
          type: integer
        state:
          type: string
          description: Draft, Booked, Rented Out, Returned, etc.
        customer_id:
          type: integer
        starts_on:
          type: string
          description: Rental start date (mm/dd/yyyy).
        ends_on:
          type: string
          description: Rental end date (mm/dd/yyyy).
        location_id:
          type: integer
        rental_total:
          type: number
    OrderInput:
      type: object
      properties:
        customer_id:
          type: integer
        starts_on:
          type: string
        ends_on:
          type: string
        location_id:
          type: integer
    Asset:
      type: object
      description: A serialized fixed (rentable) asset.
      properties:
        id:
          type: integer
        name:
          type: string
        identifier:
          type: string
        state:
          type: string
        group_id:
          type: integer
        location_id:
          type: integer
        latitude:
          type: number
        longitude:
          type: number
    AssetInput:
      type: object
      properties:
        name:
          type: string
        group_id:
          type: integer
        location_id:
          type: integer
    InventoryItem:
      type: object
      description: A volatile asset (inventory item) tracked by quantity.
      properties:
        id:
          type: integer
        name:
          type: string
        group_id:
          type: integer
        total_quantity:
          type: number
        available_quantity:
          type: number
    Bundle:
      type: object
      description: A reusable kit of assets and inventory.
      properties:
        id:
          type: integer
        name:
          type: string
        line_items:
          type: array
          items:
            type: object
    Customer:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        active:
          type: boolean
        business_id:
          type: integer
    Member:
      type: object
      description: A staff user of the rental account.
      properties:
        id:
          type: integer
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
        role:
          type: string
        active:
          type: boolean
    Location:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        street:
          type: string
        active:
          type: boolean
    BookedDate:
      type: object
      properties:
        starts_on:
          type: string
        ends_on:
          type: string
        order_number:
          type: integer
    Error:
      type: object
      properties:
        error:
          type: string
        errors:
          type: array
          items:
            type: string
