        '200':
          description: Booked date ranges.
          content:
            application/json:
              schema:
                type: object
                properties:
                  booked_dates:
                    type: array
                    items:
                      $ref: '#/components/schemas/BookedDate'
  /inventory/{assetNum}/booked_dates.api:
