description: >-
  FinOps view of EZRentOut spend. EZRentOut (by EZO) is a subscription SaaS
  product billed as a tiered monthly plan (Essential, Growth, Premium,
  Enterprise), typically billed annually, priced by tier and user seats rather
  than by API consumption. The REST API carries no separate per-call charge - it
  is a Fair Use benefit of a paid subscription. The dominant cost drivers are the
  subscription tier and the number of member seats, plus any add-ons and
  enterprise terms. API spend is therefore effectively a fixed subscription cost,
  not a usage meter, so cost optimization focuses on right-sizing the plan tier
  and seat count.
notes: >-
  Per-tier list prices are approximate and unreconciled; confirm on the
  EZRentOut pricing page. There is no metered API line item to allocate - model
  API cost as a share of the platform subscription. Watch for seat growth and
  tier upgrades as the real cost levers.
