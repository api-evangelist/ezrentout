meters:
- name: subscription_tier
  description: The EZRentOut plan tier (Essential, Growth, Premium, Enterprise) - the primary cost driver.
  unit: subscription
  aggregation: max
  dimensions:
  - account
  - plan
- name: member_seats
  description: Number of member (user) seats on the account; higher tiers and extra seats increase cost.
  unit: seats
  aggregation: max
  dimensions:
  - account
- name: api_requests
  description: API requests under Fair Use; informational only - not separately billed, but signals whether a higher tier is warranted.
  unit: requests
  aggregation: sum
  dimensions:
  - account
principles:
- name: Visibility
  description: Track the subscription tier, seat count, and (informationally) API request volume so integration teams can see what drives the invoice.
- name: Allocation
  description: Attribute the EZRentOut subscription to the rental operations cost center; if multiple teams share it, split by member seats.
- name: Optimization
  description: Right-size the plan tier and member seat count to actual usage; paginate and cache API reads to stay within Fair Use rather than needing a higher tier.
- name: Accountability
  description: Assign an owner for the EZRentOut subscription who reviews tier, seats, and renewal terms each cycle.
