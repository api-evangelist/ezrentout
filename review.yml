    type: LinkedIn
    note: EZRentOut is presented as "EZRentOut by EZO".
actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket or other server-push protocol surface exists, and EZRentOut's
    own public API is request/response REST scoped to a per-company subdomain.
    No AsyncAPI document was created because there is no documented event,
    streaming, or WebSocket transport on EZRentOut's API to model. A public
    outbound webhooks API is likewise not documented as of the review date.
