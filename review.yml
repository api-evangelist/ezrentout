  endpointsModeled:
    - note: |
        Request and response bodies (schemas) in the OpenAPI are modeled
        representations. EZRentOut publishes endpoint paths, methods, and curl
        examples in its developer docs but does not publish a machine-readable
        OpenAPI document, so property sets on Order, Asset, InventoryItem,
        Bundle, Customer, Member, Location, and BookedDate are illustrative and
        should be verified against live API responses. The set of paths above is
        a representative (not exhaustive) selection of the documented API.
sources:
  - url: https://ezo.io/ezrentout/developers/
    type: Documentation
    note: EZRentOut developer documentation - base URL, token-header auth, and endpoint reference with curl examples.
  - url: https://ezo.io/ezrentout/blog/location-tracking-assets-api/
    type: Documentation
    note: How-to for enabling location tracking (GPS coordinates) on assets via the API.
  - url: https://ezo.io/ezrentout/pricing/
    type: Pricing
    note: EZRentOut subscription tiers; API access is a Fair Use benefit of paid plans, not separately metered.
  - url: https://ezo.io/ezofficeinventory/developers/
    type: Documentation
    note: Sister product (EZOfficeInventory) developer docs; documents ~60 requests/minute Fair Use, used as a reference for EZRentOut rate behavior.
