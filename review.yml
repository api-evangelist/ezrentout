aid: ezrentout
name: EZRentOut
review:
  question: Does EZRentOut expose a documented public WebSocket API?
  answer: false
  date: '2026-07-03'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  asyncapiScopeNote: |
    No AsyncAPI document was authored. EZRentOut's public API is a
    request/response REST API over HTTPS - resource endpoints namespaced with a
    .api suffix on the customer's own {subdomain}.ezrentout.com tenant,
    authenticated with a per-company access token in a token header. There is no
    documented server-push transport (WebSocket or Server-Sent Events) on
    EZRentOut's API to model. EZRentOut's developer documentation also does not
    document a public webhooks / callback surface as of the review date; event
    notifications, where they exist, are handled inside the product UI (alerts,
    notifications) rather than through a documented outbound event API.
findings:
  summary: |
    EZRentOut does not publish a documented public WebSocket API. EZRentOut is
    cloud equipment rental management software from EZO (the company behind
    EZOfficeInventory). Its API is a REST API made available to paying customers
    for custom integrations, subject to a Fair Use policy. Requests are scoped to
    the customer's own tenant at https://{subdomain}.ezrentout.com, use endpoints
    suffixed with .api, and are authenticated with a per-company access token
    sent in a `token` HTTP header over HTTPS (API is disabled by default and must
    be enabled by the account owner in Settings). All interactions are
    client-initiated request/response - list, create, update, delete, and action
    endpoints for orders (baskets), assets, inventory and stock, bundles,
    customers, members, locations, availability, payments/taxes, purchase orders,
    and maintenance/work orders. No realtime, bidirectional, or streaming
    WebSocket (ws:// or wss://) endpoint is documented anywhere on EZRentOut's
    API.
  openSource: |
    EZRentOut is a closed-source, proprietary SaaS product. There is no public
    open-source client, SDK, or self-hostable core published under an EZO or
    EZRentOut GitHub organization that could be confirmed at review time.
    Integration is via the documented REST API only.
  transports:
    - protocol: REST
      scheme: https
      baseURL: https://{subdomain}.ezrentout.com
      documented: true
      note: Per-company REST API. Endpoints suffixed with .api; token header auth; paginated via page.
    - protocol: Webhook
      scheme: https
      documented: false
      note: No documented public outbound webhook / callback API on EZRentOut as of the review date.
    - protocol: WebSocket
      scheme: wss
      documented: false
      note: No WebSocket endpoint is documented anywhere in EZRentOut's developer documentation.
